<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Item</title>
<style>
body {background: #0f1115; color: white; font-family: Arial; max-width: 600px; margin: auto; padding: 20px;}
input {width: 100%; margin-bottom: 10px; padding: 8px; background: #1a1d24; border: 1px solid #333; color: white; border-radius: 6px;}
button {background: #3b82f6; border: none; padding: 10px; color: white; border-radius: 6px; cursor: pointer; width: 103%;}
</style>
</head>
<body>
<h1>Edit Item</h1>
<form method="POST" action="/item/{{.ID}}">
    <input name="name" value="{{.Name}}" placeholder="Name" required>
    <input name="rating" type="number" step="0.1" min="1" max="10" value="{{.Rating}}" placeholder="Rating" required>
    <input name="comment" value="{{.Comment}}" placeholder="Comment">
    <input name="image_path" value="{{.ImagePath}}" placeholder="Image path">
    <button type="submit">Update</button>
</form>
<div style="margin-top:20px;">
    <a href="/">Back to List</a>
</div>
</body>
</html>
