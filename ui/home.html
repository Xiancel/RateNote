<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Items</title>

<style>
body {
    background: #0f1115;
    color: white;
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1a1d24;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    background: #3b82f6;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<div class="header">
    <h1>Items List</h1>
    <a href="/add">
        <button>Add Item</button>
    </a>
</div>

<input placeholder="Search..." />

{{range .Items}}
<div class="card">
    <h3>{{.Name}}</h3>
    <p>Rating: {{.Rating}}</p>
    <p>{{.Comment}}</p>
    <a href="/item/{{.ID}}">Open</a>
</div>
{{else}}
<p>No items found</p>
{{end}}

</body>
</html>
